<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!--Metadados-->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Augusto L. Camarano" />
    <meta name="description" content="Tudo o que você é, em apenas um lugar, apenas um link."/>
    <meta name="keywords" content="web, site, links, redes sociais, social media, desenvolvimento,
    programador, front-end, designer, ui, ux, website, alcamarano, augusto camarano"/>
    <meta name="copyright" content="alcamarano 2023"/>
    <meta http-equiv="content-language" content="pt-br" />
    <meta name="theme-color" content="#171717"/>
    <!--Fontes-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!--Favicon-->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/fav-icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/fav-icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/img/fav-icon/favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <!--CSS-->
    <link rel="stylesheet" href="assets/css/style.css">
    <!--Titulo-->
    <title>Bio // Augusto L. Camarano</title>
</head>
<body>
    <!--Cabeçalho-->
    <header class="full__header">
        <figure class="header__figure">
            <img src="assets/img/profile/A-Camarano.jpg" alt="Foto de rosto do Augusto L. Camarano" class="header__figure-img box__shadow">
            <figcaption hidden></figcaption>
        </figure>
        <div>
            <h1 class="header__h1-title text__shadow">Augusto Camarano</h1>
            <p class="header__p text__shadow">&#x1F4DA; Análise e Desenvolvimento de Sistemas</p>
            <p class="header__p text__shadow">&#x1F9D1;&#x200D;&#x1F4BB; Dev. Front-end</p>
            <p class="header__p text__shadow">&#x1F3A8; Designer</p>
        </div>
    </header>
    <!--Corpo-->
    <main class="full__main">
        <section class="main__section">
            <article class="article__bio">
                <ol class="bio__ol">
                    <div class="bio__div bio__div-margin">
                        <h2 class="bio__div-h2">Profissional</h2>
                        <div class="bio__div-item">
                            <li class="bio__div__item-li item__linkedin box__shadow">
                                <a href="https://www.linkedin.com/in/alcamarano/" target="_blank" rel="external" class="bio__div__item-anchor" title="Acesse o meu perfil do LinkedIn">
                                    <img src="assets/img/icon/linkedin.png" alt="Ícone do LinkedIn" class="bio__div__item-img-icon">&nbsp;Linkedin
                                </a>
                            </li>
                            <li class="bio__div__item-li item__github box__shadow">
                                <a href="https://github.com/alcamarano" target="_blank" rel="external" class="bio__div__item-anchor" title="Acesse o meu perfil do Github">
                                    <img src="assets/img/icon/github.png" alt="Ícone do Github" class="bio__div__item-img-icon">&nbsp;Github
                                </a>
                            </li>
                            <li class="bio__div__item-li item__behance box__shadow">
                                <a href="https://www.behance.net/alcamarano" target="_blank" rel="external" class="bio__div__item-anchor" title="Acesse o meu perfil do Behance">
                                    <img src="assets/img/icon/behance.png" alt="Ícone do Behance" class="bio__div__item-img-icon">&nbsp;Behance
                                </a>
                            </li>
                            <li class="bio__div__item-li item__telegram box__shadow">
                                <a href="https://t.me/alcamarano" target="_blank" rel="external" class="bio__div__item-anchor" title="Entre em contato pelo Telegram">
                                    <img src="assets/img/icon/telegram.png" alt="Ícone do Telegram" class="bio__div__item-img-icon">&nbsp;Telegram
                                </a>
                            </li>
                            <li class="bio__div__item-li item__email box__shadow">
                                <a href="mailto:contatocamarano@gmail.com" target="_blank" rel="external" class="bio__div__item-anchor" title="Entre em contato por Email">
                                    <img src="assets/img/icon/email.png" alt="Ícone de Email" class="bio__div__item-img-icon">&nbsp;Email
                                </a>
                            </li>
                        </div>
                    </div>
                    <div class="bio__div">
                        <h2 class="bio__div-h2">Redes Sociais</h2>
                        <div class="bio__div-item">
                            <li class="bio__div__item-li item__instagram box__shadow">
                                <a href="https://www.instagram.com/alcamarano/" target="_blank" rel="external" class="bio__div__item-anchor" title="Acesse o meu perfil do Instagram">
                                    <img src="assets/img/icon/instagram.png" alt="Ícone do Instagram" class="bio__div__item-img-icon">&nbsp;Instagram
                                </a>
                            </li>
                            <li class="bio__div__item-li item__twitter box__shadow">
                                <a href="https://twitter.com/alcamarano" target="_blank" rel="external" class="bio__div__item-anchor" title="Acesse o meu perfil do Twitter">
                                    <img src="assets/img/icon/twitter.png" alt="Ícone do Twitter" class="bio__div__item-img-icon">&nbsp;Twitter
                                </a>
                            </li>
                        </div>
                    </div>
                </ol>
            </article>
        </section>
    </main>
    <!--Rodapé-->
    <footer class="full__footer">
        <p class="footer__p">
            &copy; 2023 alcamarano
        </p>
    </footer>
</body>
</html>
